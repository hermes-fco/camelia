# 🌺 Camélia PoC #6 — Persistence + Resilience
# 8 containers: nats, model-deepseek, tool-executor,
#               orchestrator, spawner, session-store (+ dynamic workers)

services:
  nats:
    image: nats:latest
    command: --jetstream
    networks: [camelia]
    healthcheck:
      test: ["CMD", "nats-server", "--version"]
      interval: 5s
      retries: 5

  model-deepseek:
    build:
      context: .
      dockerfile: containers/model-deepseek/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SERVICE_NAME=model-deepseek

  tool-executor:
    build:
      context: .
      dockerfile: containers/tool-executor/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SANDBOX_DIR=/tmp/sandbox

  session-store:
    build:
      context: .
      dockerfile: containers/session-store/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222

  orchestrator:
    build:
      context: .
      dockerfile: containers/orchestrator/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      tool-executor:
        condition: service_started
      session-store:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=orchestrator
      - MAX_WORKERS=3

  spawner:
    build:
      context: .
      dockerfile: containers/spawner/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - MAX_WORKERS=3
      - WORKER_IMAGE=camelia-worker:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  worker-shell:
    build:
      context: .
      dockerfile: containers/worker-shell/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
      tool-executor:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=worker-shell

  worker-factory:
    build:
      context: .
      dockerfile: containers/worker-factory/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      session-store:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - MODEL_SUBJECT=model.deepseek.completion
      - FACTORY_RETRIES=3

  worker-api-time:
    build:
      context: .
      dockerfile: containers/api.time/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=api-time

  worker-raku-compile:
    build:
      context: .
      dockerfile: containers/raku.compile/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=raku-compile

  worker-web-browser:
    build:
      context: .
      dockerfile: containers/web-browser/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=web-browser

networks:
  camelia:
    driver: bridge
