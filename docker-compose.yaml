# 🌺 Camélia PoC #3 — Multi-Agent Delegation
# 6 containers: nats, model-deepseek, tool-executor,
#               worker-code-reader, worker-doc-writer, orchestrator

services:
  nats:
    image: nats:latest
    command: --jetstream
    networks: [camelia]
    healthcheck:
      test: ["CMD", "nats-server", "--version"]
      interval: 5s
      retries: 5

  model-deepseek:
    build:
      context: .
      dockerfile: containers/model-deepseek/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SERVICE_NAME=model-deepseek

  tool-executor:
    build:
      context: .
      dockerfile: containers/tool-executor/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SANDBOX_DIR=/tmp/sandbox

  worker-code-reader:
    build:
      context: .
      dockerfile: containers/worker/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      tool-executor:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - WORKER_ID=code-reader

  worker-doc-writer:
    build:
      context: .
      dockerfile: containers/worker/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      tool-executor:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - WORKER_ID=doc-writer

  orchestrator:
    build:
      context: .
      dockerfile: containers/orchestrator/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      tool-executor:
        condition: service_started
      worker-code-reader:
        condition: service_started
      worker-doc-writer:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=orchestrator

networks:
  camelia:
    driver: bridge
