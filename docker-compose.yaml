# 🌺 Camélia PoC #4 — Worker Pool with JetStream + Auto-Scaling
# 7 containers: nats, model-deepseek, tool-executor,
#               orchestrator, spawner (+ dynamic workers)

services:
  nats:
    image: nats:latest
    command: --jetstream
    networks: [camelia]
    healthcheck:
      test: ["CMD", "nats-server", "--version"]
      interval: 5s
      retries: 5

  model-deepseek:
    build:
      context: .
      dockerfile: containers/model-deepseek/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - DEEPSEEK_API_KEY=${DE...KEY}
      - SERVICE_NAME=model-deepseek

  tool-executor:
    build:
      context: .
      dockerfile: containers/tool-executor/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SANDBOX_DIR=/tmp/sandbox

  orchestrator:
    build:
      context: .
      dockerfile: containers/orchestrator/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      tool-executor:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=orchestrator
      - MAX_WORKERS=3

  spawner:
    build:
      context: .
      dockerfile: containers/spawner/Dockerfile
    networks: [camelia]
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - MAX_WORKERS=3
      - WORKER_IMAGE=camelia-worker:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  camelia:
    driver: bridge
