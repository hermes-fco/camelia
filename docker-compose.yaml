# 🌺 Camélia PoC #6 — Persistence + Resilience
# 8 containers: nats, model-deepseek, tool-executor,
#               orchestrator, spawner, session-store (+ dynamic workers)

services:
  nats:
    image: nats:latest
    command: --jetstream
    networks: [camelia]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "--version"]
      interval: 5s
      retries: 5

  model-deepseek:
    build:
      context: .
      dockerfile: containers/model-deepseek/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SERVICE_NAME=model-deepseek
      - SERVICE_SUBJECT=model.deepseek.completion
      - DEEPSEEK_MODEL=deepseek-v4-pro

  model-deepseek-flash:
    build:
      context: .
      dockerfile: containers/model-deepseek/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SERVICE_NAME=model-deepseek-flash
      - SERVICE_SUBJECT=model.deepseek.flash
      - DEEPSEEK_MODEL=deepseek-flash

  tool-executor:
    build:
      context: .
      dockerfile: containers/tool-executor/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SANDBOX_DIR=/tmp/sandbox

  session-store:
    build:
      context: .
      dockerfile: containers/session-store/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222

  orchestrator:
    build:
      context: .
      dockerfile: containers/orchestrator/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      tool-executor:
        condition: service_started
      session-store:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=orchestrator
      - MAX_WORKERS=3
      - MODEL_SUBJECT=model.deepseek.completion
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  spawner:
    build:
      context: .
      dockerfile: containers/spawner/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - MAX_WORKERS=3
      - WORKER_IMAGE=camelia-worker:latest
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  worker-shell:
    build:
      context: .
      dockerfile: containers/worker-shell/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      tool-executor:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=worker-shell

  worker-factory:
    build:
      context: .
      dockerfile: containers/worker-factory/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
      session-store:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - MODEL_SUBJECT=model.deepseek.completion
      - FACTORY_RETRIES=3

  worker-timer:
    build:
      context: .
      dockerfile: containers/worker-timer/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=worker-timer

  worker-api-time:
    build:
      context: .
      dockerfile: containers/api.time/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=api-time

  worker-raku-compile:
    build:
      context: .
      dockerfile: containers/raku.compile/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=raku-compile

  worker-web-browser:
    build:
      context: .
      dockerfile: containers/web-browser/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=web-browser

  worker-web-search:
    build:
      context: .
      dockerfile: containers/web-search/Dockerfile
    networks: [camelia]
    restart: "no"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=web-search

  entry-factory:
    build:
      context: .
      dockerfile: containers/entry-factory/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      model-deepseek:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - MODEL_SUBJECT=model.deepseek.completion
      - FACTORY_RETRIES=3

  entry-telegram:
    build:
      context: .
      dockerfile: containers/entry-telegram/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - ENTRY_NAME=entry.telegram
      - ENTRY_TOKEN=${ENTRY_TOKEN}

  skill-store:
    build:
      context: .
      dockerfile: containers/skill-store/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=skill-store

  docker-compose:
    build:
      context: .
      dockerfile: containers/docker-compose/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=worker-docker-compose
      - PROJECT_DIR=/camelia
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/camelia:ro

  auto-pilot:
    build:
      context: .
      dockerfile: containers/auto-pilot/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      session-store:
        condition: service_started
      orchestrator:
        condition: service_started
      model-deepseek-flash:
        condition: service_started
    environment:
      - NATS_URL=nats://nats:4222
      - CHECK_INTERVAL=60
      - STALE_SECONDS=300
      - SCAN_MODEL=1
      - MODEL_SUBJECT=model.deepseek.flash

  worker-system:
    build:
      context: .
      dockerfile: containers/system/Dockerfile
    networks: [camelia]
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SERVICE_NAME=worker-system
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  camelia:
    driver: bridge
